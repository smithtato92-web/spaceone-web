<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaceOne - Almacenamiento Ilimitado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .service-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .service-card:active {
            transform: scale(0.95);
        }

        .selected-plan {
            border: 2px solid #3b82f6 !important;
            background-color: #eff6ff;
        }

        #toast {
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translate(-50%, 20px);
        }
        #toast.visible {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        .hidden-field {
            display: none;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Spinner para carga */
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="pb-20">

    <!-- Encabezado -->
    <header class="bg-white px-6 py-4 shadow-sm sticky top-0 z-50 flex justify-center items-center">
        <div class="flex items-center gap-2">
            <svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L14.5 9H9.5L12 2Z" fill="#3b82f6"/>
                <path d="M12 22C17.5228 22 22 17.5228 22 12C22 10.5 21.5 9 20.5 8" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
                <path d="M12 6C8.68629 6 6 8.68629 6 12C6 15.3137 8.68629 18 12 18C15.3137 18 18 15.3137 18 12" stroke="#1e40af" stroke-width="2" stroke-dasharray="2 2"/>
                <circle cx="12" cy="12" r="3" fill="#1e40af"/>
            </svg>
            <span class="text-2xl font-black logo-gradient tracking-tighter">SpaceOne</span>
        </div>
    </header>

    <main class="max-w-md mx-auto px-6 py-8">
        <!-- Sección Hero -->
        <section class="mb-10 text-center flex flex-col items-center">
            <div class="mb-4 p-4 bg-blue-50 rounded-full">
                <svg class="w-16 h-16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L15 9H9L12 2Z" fill="#3b82f6"/>
                    <path d="M12 12L12 22" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
                    <path d="M7 16L12 12L17 16" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
                    <path d="M2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12Z" stroke="#1e40af" stroke-opacity="0.2" stroke-width="2"/>
                </svg>
            </div>
            <h2 class="text-3xl font-bold text-gray-800 mb-2">Libera espacio hoy</h2>
            <p class="text-gray-500 text-lg">Tu cuenta de almacenamiento premium con <span class="font-semibold text-blue-600">SpaceOne</span>.</p>
        </section>

        <!-- Selección rápida -->
        <section class="mb-10">
            <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-4 text-center">Selección rápida</h3>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="selectService('Google One / Gmail', this)" class="service-card p-5 rounded-2xl bg-white shadow-sm flex flex-col items-center cursor-pointer border-2 border-transparent hover:shadow-md">
                    <svg class="w-10 h-10 mb-2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12.0001 5.4c1.74 0 3.19.62 4.11 1.47l3.07-3.07C17.29 2.05 14.86 1 12.0001 1c-4.32 0-8.03 2.5-9.76 6.13l3.61 2.8c.85-2.55 3.23-4.53 6.15-4.53z" fill="#EA4335"/>
                        <path d="M23.4901 12.27c0-.82-.07-1.61-.21-2.37H12.0001v4.49h6.49c-.28 1.51-1.12 2.78-2.39 3.63l3.69 2.87c2.16-1.99 3.41-4.92 3.41-8.62z" fill="#4285F4"/>
                        <path d="M5.8501 14.47c-.23-.69-.36-1.42-.36-2.18s.13-1.49.36-2.18l-3.61-2.8C1.51 8.76 1 10.32 1 12s.51 3.24 1.24 4.71l3.61-2.81z" fill="#FBBC05"/>
                        <path d="M12.0001 23c2.86 0 5.26-.94 7.01-2.56l-3.69-2.87c-.98.66-2.23 1.05-3.32 1.05-2.92 0-5.3-1.98-6.15-4.53l-3.61 2.81C4.03 20.5 7.74 23 12.0001 23z" fill="#34A853"/>
                    </svg>
                    <span class="text-xs font-semibold text-gray-700">Google One</span>
                </div>

                <div onclick="selectService('Apple iCloud', this)" class="service-card p-5 rounded-2xl bg-white shadow-sm flex flex-col items-center cursor-pointer border-2 border-transparent hover:shadow-md">
                    <i class="fab fa-apple text-3xl mb-2 text-gray-900"></i>
                    <span class="text-xs font-semibold text-gray-700">iCloud</span>
                </div>

                <div onclick="selectService('Microsoft OneDrive', this)" class="service-card p-5 rounded-2xl bg-white shadow-sm flex flex-col items-center cursor-pointer border-2 border-transparent hover:shadow-md">
                    <i class="fas fa-cloud-upload-alt text-3xl mb-2 text-blue-500"></i>
                    <span class="text-xs font-semibold text-gray-700">OneDrive</span>
                </div>

                <div onclick="selectService('Otros', this)" class="service-card p-5 rounded-2xl bg-white shadow-sm flex flex-col items-center cursor-pointer border-2 border-transparent hover:shadow-md">
                    <i class="fas fa-ellipsis-h text-3xl mb-2 text-gray-400"></i>
                    <span class="text-xs font-semibold text-gray-700">Otros</span>
                </div>
            </div>
        </section>

        <!-- Formulario -->
        <section id="form-section" class="mb-10 bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
            <h3 class="text-xl font-bold text-gray-800 mb-5">Solicitar cotización</h3>
            <form id="storage-form" class="space-y-5">
                
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Selecciona el servicio</label>
                    <div class="relative">
                        <select name="servicio" id="service-dropdown" onchange="handleDropdownChange(this)" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-gray-800 font-medium focus:ring-2 focus:ring-blue-500 outline-none appearance-none">
                            <option value="" disabled selected>Elige un servicio...</option>
                            <option value="Google One / Gmail">Google One / Gmail</option>
                            <option value="Apple iCloud">Apple iCloud</option>
                            <option value="Microsoft OneDrive">Microsoft OneDrive</option>
                            <option value="Otros">Otro (especificar)</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-gray-400">
                            <i class="fas fa-chevron-down"></i>
                        </div>
                    </div>
                </div>

                <div id="other-service-container" class="hidden-field">
                    <label class="block text-xs font-bold text-blue-500 uppercase mb-2">Nombre del servicio</label>
                    <input type="text" name="otro_servicio" id="other-service-name" class="w-full bg-blue-50 border border-blue-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ej: Dropbox, Mega, etc.">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Almacenamiento deseado</label>
                    <div class="relative">
                        <select name="capacidad" id="storage-select" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-gray-800 focus:ring-2 focus:ring-blue-500 outline-none appearance-none">
                            <option>100 GB</option>
                            <option>200 GB</option>
                            <option>500 GB</option>
                            <option>1 TB</option>
                            <option>2 TB +</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-gray-400">
                            <i class="fas fa-chevron-down"></i>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Tu nombre</label>
                    <input type="text" name="nombre" id="user-name" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ej: Carlos Ruiz">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Correo electrónico</label>
                    <input type="email" name="email" id="user-email" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="ejemplo@correo.com">
                </div>

                <button type="button" id="submit-btn" onclick="handleSubmit()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-200 flex justify-center items-center">
                    <span id="btn-text">Enviar solicitud</span>
                </button>
            </form>
        </section>

        <!-- Contacto Directo -->
        <section class="mb-10">
            <h3 class="text-lg font-semibold text-gray-700 mb-4 text-center">Atención Directa</h3>
            <div class="grid grid-cols-1 gap-3">
                <a href="https://t.me/tuusuario" target="_blank" class="flex items-center justify-between bg-[#0088cc] text-white px-6 py-4 rounded-2xl shadow-md">
                    <span class="font-bold"><i class="fab fa-telegram-plane mr-3 text-xl"></i> Telegram</span>
                    <i class="fas fa-arrow-right opacity-50"></i>
                </a>
                <a href="mailto:soporte@tuempresa.com" class="flex items-center justify-between bg-gray-800 text-white px-6 py-4 rounded-2xl shadow-md">
                    <span class="font-bold"><i class="fas fa-envelope mr-3 text-xl"></i> Email</span>
                    <i class="fas fa-arrow-right opacity-50"></i>
                </a>
            </div>
        </section>

        <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-8 py-4 rounded-2xl text-sm font-bold shadow-2xl opacity-0 pointer-events-none z-[100] text-center w-[80%] max-w-xs">
            ¡Mensaje enviado!
        </div>

    </main>

    <script>
        // CONFIGURACIÓN: Aquí solo debe ir el código del final (ej: "mreowpww")
        const FORMSPREE_ID = "mreowpww"; 

        function selectService(name, element) {
            document.querySelectorAll('.service-card').forEach(card => card.classList.remove('selected-plan'));
            element.classList.add('selected-plan');
            const dropdown = document.getElementById('service-dropdown');
            dropdown.value = name;
            handleDropdownChange(dropdown);
            document.getElementById('form-section').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function handleDropdownChange(dropdown) {
            const container = document.getElementById('other-service-container');
            const otherInput = document.getElementById('other-service-name');
            if (dropdown.value === "Otros") {
                container.style.display = "block";
                otherInput.focus();
            } else {
                container.style.display = "none";
                otherInput.value = "";
            }
        }

        async function handleSubmit() {
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const form = document.getElementById('storage-form');
            const formData = new FormData(form);
            
            // Validaciones básicas
            if(!formData.get('servicio')) { showToast("⚠️ Elige un servicio"); return; }
            if(!formData.get('nombre')) { showToast("⚠️ Ingresa tu nombre"); return; }
            if(!formData.get('email')) { showToast("⚠️ Ingresa un email"); return; }

            // Estado de carga
            btn.disabled = true;
            btnText.innerHTML = '<span class="loader"></span> Enviando...';

            try {
                // Limpiamos el ID por si pusiste la URL completa por error
                const cleanId = FORMSPREE_ID.replace("https://formspree.io/f/", "");
                
                const response = await fetch(`https://formspree.io/f/${cleanId}`, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    showToast("✅ ¡Recibido! Te contactaremos pronto.");
                    form.reset();
                    document.getElementById('other-service-container').style.display = "none";
                    document.querySelectorAll('.service-card').forEach(card => card.classList.remove('selected-plan'));
                } else {
                    const errorData = await response.json();
                    showToast("❌ Error: " + (errorData.error || "No se pudo enviar"));
                }
            } catch (error) {
                console.error("Error de Formspree:", error);
                showToast("❌ Hubo un problema de conexión.");
            } finally {
                btn.disabled = false;
                btnText.innerHTML = 'Enviar solicitud';
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 4000);
        }
    </script>
</body>
</html>
