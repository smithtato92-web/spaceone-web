<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaceOne - Almacenamiento Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .service-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }

        .selected-plan {
            border-color: #3b82f6 !important;
            background-color: #eff6ff;
        }

        #toast {
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translate(-50%, 20px);
            opacity: 0;
            pointer-events: none;
        }
        #toast.visible {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        .logo-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white px-6 py-4 shadow-sm sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L14.5 9H9.5L12 2Z" fill="#3b82f6"/>
                <circle cx="12" cy="12" r="3" fill="#1e40af"/>
            </svg>
            <span class="text-2xl font-black logo-gradient tracking-tighter">SpaceOne</span>
        </div>
        <div id="user-header" class="hidden flex items-center gap-3">
            <div id="user-info" class="text-right hidden sm:block">
                <p id="user-display-name" class="text-xs font-bold text-gray-800"></p>
            </div>
            <img id="user-photo" class="w-8 h-8 rounded-full border border-blue-200 bg-gray-100" src="" alt="">
            <button onclick="logout()" class="text-xs text-red-500 font-bold hover:underline">Salir</button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-6 py-8">
        
        <!-- PASO 1: Selección de Plan -->
        <section class="mb-8">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-extrabold text-gray-800">1. Elige tu Plan</h2>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div onclick="selectService('Google One', this)" class="service-card p-5 rounded-2xl bg-white shadow-sm flex flex-col items-center cursor-pointer selected-plan">
                    <i class="fab fa-google text-3xl mb-2 text-red-500"></i>
                    <span class="text-xs font-bold text-gray-700">Google One</span>
                </div>
                <div onclick="selectService('Apple iCloud', this)" class="service-card p-5 rounded-2xl bg-white shadow-sm flex flex-col items-center cursor-pointer">
                    <i class="fab fa-apple text-3xl mb-2 text-gray-900"></i>
                    <span class="text-xs font-bold text-gray-700">iCloud</span>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="selectCapacity('100 GB', this)" class="cap-btn py-2 text-sm font-bold rounded-lg border border-gray-200 bg-blue-600 text-white">100 GB</button>
                    <button onclick="selectCapacity('200 GB', this)" class="cap-btn py-2 text-sm font-bold rounded-lg border border-gray-200">200 GB</button>
                    <button onclick="selectCapacity('2 TB', this)" class="cap-btn py-2 text-sm font-bold rounded-lg border border-gray-200">2 TB</button>
                </div>
            </div>
        </section>

        <!-- PASO 2: Identificación (Email/Password) -->
        <section id="auth-section" class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100 mb-8">
            <h3 class="text-lg font-bold text-gray-800 text-center mb-6">2. Identificación</h3>
            
            <div id="auth-form-container" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Correo Electrónico</label>
                    <input type="email" id="auth-email" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="tu@email.com">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Contraseña</label>
                    <input type="password" id="auth-password" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••">
                </div>
                
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button onclick="handleEmailAuth('login')" class="bg-gray-800 text-white text-sm font-bold py-3 rounded-xl hover:bg-black transition-all">Entrar</button>
                    <button onclick="handleEmailAuth('register')" class="border border-gray-800 text-gray-800 text-sm font-bold py-3 rounded-xl hover:bg-gray-50 transition-all">Registrar</button>
                </div>

                <div class="relative flex py-3 items-center">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink mx-4 text-gray-400 text-[10px] font-bold uppercase">o usa</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>

                <button onclick="loginWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 py-3 rounded-xl hover:bg-gray-50 transition-all font-semibold text-gray-700 text-sm">
                    <svg class="w-4 h-4" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"></path></svg>
                    Google
                </button>
            </div>

            <!-- Estado Logueado -->
            <div id="logged-status" class="hidden text-center p-4 bg-green-50 rounded-2xl border border-green-100">
                <p class="text-sm font-bold text-green-700">✅ Sesión Iniciada</p>
                <p id="logged-email" class="text-xs text-green-600 truncate"></p>
            </div>
        </section>

        <!-- PASO 3: Verificación y Envío -->
        <section class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100 space-y-4">
            <h3 class="text-lg font-bold text-gray-800 text-center">3. Contacto Final</h3>
            
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">WhatsApp</label>
                <input type="tel" id="user-phone" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="+54 9 ...">
            </div>

            <button type="button" id="submit-btn" onclick="saveOrder()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2 opacity-50 cursor-not-allowed" disabled>
                <span id="btn-text">Confirmar y Verificar</span>
            </button>
            <p id="auth-warning" class="text-[10px] text-red-500 text-center font-bold">Identifícate arriba para continuar</p>
        </section>

        <footer class="text-center py-8">
            <p class="text-gray-400 text-[10px] font-bold tracking-widest uppercase">SpaceOne Premium Solutions</p>
        </footer>

        <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-8 py-4 rounded-2xl text-sm font-bold shadow-2xl z-[100] text-center w-[80%] max-w-xs">
            Mensaje
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'spaceone-auth-v2';

        let selectedService = "Google One";
        let selectedCapacity = "100 GB";

        // --- PLANES ---
        window.selectService = (name, element) => {
            selectedService = name;
            document.querySelectorAll('.service-card').forEach(c => c.classList.remove('selected-plan'));
            element.classList.add('selected-plan');
        };

        window.selectCapacity = (cap, element) => {
            selectedCapacity = cap;
            document.querySelectorAll('.cap-btn').forEach(b => b.classList.remove('bg-blue-600', 'text-white'));
            element.classList.add('bg-blue-600', 'text-white');
        };

        // --- AUTENTICACIÓN ---
        window.handleEmailAuth = async (type) => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;

            if (!email || !password) {
                showToast("⚠️ Completa los campos");
                return;
            }

            try {
                if (type === 'register') {
                    await createUserWithEmailAndPassword(auth, email, password);
                    showToast("✅ Cuenta creada con éxito");
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (error) {
                console.error(error);
                let msg = "❌ Error en autenticación";
                if (error.code === 'auth/weak-password') msg = "❌ Contraseña muy corta";
                if (error.code === 'auth/email-already-in-use') msg = "❌ El email ya está en uso";
                if (error.code === 'auth/invalid-credential') msg = "❌ Credenciales incorrectas";
                showToast(msg);
            }
        };

        window.loginWithGoogle = async () => {
            try { await signInWithPopup(auth, provider); } 
            catch (e) { showToast("❌ Error con Google"); }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const authForm = document.getElementById('auth-form-container');
            const loggedStatus = document.getElementById('logged-status');
            const loggedEmail = document.getElementById('logged-email');
            const submitBtn = document.getElementById('submit-btn');
            const authWarning = document.getElementById('auth-warning');
            const userHeader = document.getElementById('user-header');
            const userPhoto = document.getElementById('user-photo');
            const userDisplayName = document.getElementById('user-display-name');

            if (user) {
                authForm.classList.add('hidden');
                loggedStatus.classList.remove('hidden');
                loggedEmail.innerText = user.email;
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                authWarning.classList.add('hidden');
                
                userHeader.classList.remove('hidden');
                userPhoto.src = user.photoURL || 'https://ui-avatars.com/api/?name=' + user.email;
                userDisplayName.innerText = user.displayName || user.email.split('@')[0];
            } else {
                authForm.classList.remove('hidden');
                loggedStatus.classList.add('hidden');
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
                authWarning.classList.remove('hidden');
                userHeader.classList.add('hidden');
            }
        });

        // --- GUARDAR ---
        window.saveOrder = async () => {
            const phone = document.getElementById('user-phone').value;
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');

            if (!phone) { showToast("⚠️ Ingresa tu WhatsApp"); return; }

            btn.disabled = true;
            btnText.innerHTML = '<span class="loader"></span> Verificando...';

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), {
                    uid: auth.currentUser.uid,
                    email: auth.currentUser.email,
                    whatsapp: phone,
                    servicio: selectedService,
                    capacidad: selectedCapacity,
                    fecha: serverTimestamp(),
                    metodoAuth: auth.currentUser.providerData[0]?.providerId || 'email'
                });
                showToast("✅ ¡Datos verificados con éxito!");
                document.getElementById('user-phone').value = "";
            } catch (e) {
                showToast("❌ Error al guardar");
            } finally {
                btn.disabled = false;
                btnText.innerText = "Confirmar y Verificar";
            }
        };

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 3000);
        }
    </script>
</body>
</html>
